apiVersion: apps/v1
kind: Deployment
metadata:
  name: kagenti-controller-manager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    control-plane: controller-manager
spec:
  replicas:  {{ .Values.controllerManager.replicas }}
  selector:
    matchLabels:
      {{- include "chart.selectorLabels" . | nindent 6 }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- include "chart.labels" . | nindent 8 }}
        control-plane: controller-manager
        {{- if and .Values.controllerManager.pod .Values.controllerManager.pod.labels }}
        {{- range $key, $value := .Values.controllerManager.pod.labels }}
        {{ $key }}: {{ $value }}
        {{- end }}
        {{- end }}
    spec:
      containers:
        - name: manager
          args:
            {{- range .Values.controllerManager.container.args }}
            - {{ . }}
            {{- end }}
            {{- if .Values.mlflow.enable }}
            - "--enable-mlflow=true"
            {{- end }}
            {{- if .Values.otelBootstrap.enable }}
            - "--enable-otel-bootstrap=true"
            {{- end }}
            {{- if .Values.mlflow.workspace }}
            - "--mlflow-workspace={{ .Values.mlflow.workspace }}"
            {{- end }}
            {{- if .Values.mlflow.experimentName }}
            - "--mlflow-experiment-name={{ .Values.mlflow.experimentName }}"
            {{- end }}
            {{- if .Values.verifiedFetch.enabled }}
            - "--enable-verified-fetch=true"
            - "--verified-fetch-spiffe-socket={{ .Values.verifiedFetch.spiffeEndpointSocket }}"
            {{- end }}
            {{- if or .Values.enforceNetworkPolicies .Values.signatureVerification.enforceNetworkPolicies }}
            - "--enforce-network-policies=true"
            {{- end }}
            {{- if .Values.signatureVerification.enabled }}
            - "--require-a2a-signature=true"
            {{- if .Values.signatureVerification.auditMode }}
            - "--signature-audit-mode=true"
            {{- end }}
            {{- if .Values.signatureVerification.enforceNetworkPolicies }}
            - "--enforce-network-policies=true"
            {{- end }}
            {{- if .Values.signatureVerification.spireTrustBundle.configMapName }}
            - "--spire-trust-bundle-configmap={{ .Values.signatureVerification.spireTrustBundle.configMapName }}"
            {{- end }}
            {{- if .Values.signatureVerification.spireTrustBundle.configMapNamespace }}
            - "--spire-trust-bundle-configmap-namespace={{ .Values.signatureVerification.spireTrustBundle.configMapNamespace }}"
            {{- end }}
            {{- if .Values.signatureVerification.spireTrustBundle.configMapKey }}
            - "--spire-trust-bundle-configmap-key={{ .Values.signatureVerification.spireTrustBundle.configMapKey }}"
            {{- end }}
            {{- if .Values.signatureVerification.spireTrustBundle.refreshInterval }}
            - "--spire-trust-bundle-refresh-interval={{ .Values.signatureVerification.spireTrustBundle.refreshInterval }}"
            {{- end }}
            {{- if .Values.signatureVerification.svidExpiryGracePeriod }}
            - "--svid-expiry-grace-period={{ .Values.signatureVerification.svidExpiryGracePeriod }}"
            {{- end }}
            {{- end }}
            {{- if .Values.keycloak }}
            - "--keycloak-admin-secret-namespace={{ .Values.keycloak.adminSecretNamespace | default "keycloak" }}"
            - "--keycloak-realm={{ .Values.keycloak.realm | default "kagenti" }}"
            {{- end }}
            {{- if .Values.authbridgeConfig }}
            {{- if not .Values.authbridgeConfig.enabled }}
            - "--enable-authbridge-config=false"
            {{- end }}
            {{- if .Values.authbridgeConfig.clientAuthType }}
            - "--client-auth-type={{ .Values.authbridgeConfig.clientAuthType }}"
            {{- end }}
            {{- if .Values.authbridgeConfig.credentialWaitTimeout }}
            - "--credential-wait-timeout={{ .Values.authbridgeConfig.credentialWaitTimeout }}"
            {{- end }}
            {{- end }}
            {{- if .Values.sigstore.cardVerification.enabled }}
            - "--enable-sigstore-verification=true"
            {{- if .Values.sigstore.cardVerification.auditMode }}
            - "--sigstore-audit-mode=true"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.certificateIdentity }}
            - "--sigstore-certificate-identity={{ .Values.sigstore.cardVerification.certificateIdentity }}"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.certificateOIDCIssuer }}
            - "--sigstore-certificate-oidc-issuer={{ .Values.sigstore.cardVerification.certificateOIDCIssuer }}"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.staging }}
            - "--sigstore-staging=true"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.trustedRoot.configMapName }}
            - "--sigstore-trusted-root-configmap={{ .Values.sigstore.cardVerification.trustedRoot.configMapName }}"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.trustedRoot.configMapNamespace }}
            - "--sigstore-trusted-root-configmap-namespace={{ .Values.sigstore.cardVerification.trustedRoot.configMapNamespace }}"
            {{- end }}
            {{- if .Values.sigstore.cardVerification.trustedRoot.configMapKey }}
            - "--sigstore-trusted-root-configmap-key={{ .Values.sigstore.cardVerification.trustedRoot.configMapKey }}"
            {{- end }}
            {{- end }}
          command:
            - {{ .Values.controllerManager.container.cmd }}
          image: {{ .Values.controllerManager.container.image.repository }}:{{ .Values.controllerManager.container.image.tag }}
          imagePullPolicy: {{ .Values.controllerManager.container.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if and .Values.keycloak .Values.keycloak.publicUrl }}
            - name: KAGENTI_KEYCLOAK_PUBLIC_URL
              value: {{ .Values.keycloak.publicUrl | quote }}
            {{- end }}
            {{- if and .Values.signatureVerification .Values.signatureVerification.spireTrustDomain }}
            - name: KAGENTI_SPIRE_TRUST_DOMAIN
              value: {{ .Values.signatureVerification.spireTrustDomain | quote }}
            {{- end }}
            {{- if .Values.controllerManager.container.env }}
            {{- range $key, $value := .Values.controllerManager.container.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.controllerManager.container.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.controllerManager.container.readinessProbe | nindent 12 }}
          {{- if .Values.webhook.enable }}
          ports:
            - containerPort: 9443
              name: webhook-server
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.controllerManager.container.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.controllerManager.container.securityContext | nindent 12 }}
          volumeMounts:
            {{- if .Values.webhook.enable }}
            - name: platform-config
              mountPath: /etc/kagenti
              readOnly: true
            - name: feature-gates
              mountPath: /etc/kagenti/feature-gates
              readOnly: true
            {{- end }}
            {{- if and .Values.webhook.enable .Values.certmanager.enable }}
            - name: webhook-cert
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            {{- end }}
            {{- if and .Values.metrics.enable .Values.certmanager.enable }}
            - name: metrics-certs
              mountPath: /tmp/k8s-metrics-server/metrics-certs
              readOnly: true
            {{- end }}
            {{- if .Values.verifiedFetch.enabled }}
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            {{- end }}
      securityContext:
        {{- toYaml .Values.controllerManager.securityContext | nindent 8 }}
      serviceAccountName: {{ .Values.controllerManager.serviceAccountName }}
      terminationGracePeriodSeconds: {{ .Values.controllerManager.terminationGracePeriodSeconds }}
      volumes:
        {{- if .Values.webhook.enable }}
        - name: platform-config
          configMap:
            name: kagenti-platform-config
        - name: feature-gates
          configMap:
            name: kagenti-feature-gates
        {{- end }}
        {{- if and .Values.webhook.enable .Values.certmanager.enable }}
        - name: webhook-cert
          secret:
            secretName: kagenti-operator-webhook-server-cert
        {{- end }}
        {{- if and .Values.metrics.enable .Values.certmanager.enable }}
        - name: metrics-certs
          secret:
            secretName: kagenti-operator-metrics-server-cert
        {{- end }}
        {{- if .Values.verifiedFetch.enabled }}
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        {{- end }}
