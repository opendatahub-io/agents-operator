# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: ghcr.io/kagenti/kagenti-operator/kagenti-operator
      tag: __PLACEHOLDER__
      pullPolicy: IfNotPresent
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
      - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
      - "--config-path=/etc/kagenti/config.yaml"
      - "--feature-gates-path=/etc/kagenti/feature-gates/feature-gates.yaml"
      - "--enable-client-registration=true"
    cmd: /manager
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: controller-manager

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true

# [VAP]: ValidatingAdmissionPolicy for agent label protection.
# Prevents manual application of the kagenti.io/type label on Deployments and
# StatefulSets (both top-level metadata and pod template spec). Only the operator
# SA (derived from controllerManager.serviceAccountName and the release namespace)
# is exempt.
vap:
  agentLabelProtection:
    enable: true

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# Enforce NetworkPolicies based on AgentCard verification status.
# Works with both verifiedFetch (mTLS) and signatureVerification (init-signer).
enforceNetworkPolicies: false

# [KEYCLOAK]: Keycloak integration settings
keycloak:
  # Namespace where the keycloak-initial-admin secret is located
  adminSecretNamespace: keycloak
  # Target realm for agent client registration
  realm: kagenti
  # External Keycloak URL (used for ISSUER / EXPECTED_AUDIENCE in authbridge-config).
  # Auto-discovered from OpenShift Route or Kubernetes Ingress named "keycloak" in
  # the adminSecretNamespace. Set here only to override auto-discovery.
  publicUrl: ""

# [AUTHBRIDGE CONFIG]: Reconcile authbridge-config ConfigMap in agent namespaces
authbridgeConfig:
  enabled: true
  clientAuthType: "client-secret"
  # How long AuthBridge waits for Keycloak credentials (increase for slow Keycloak startup)
  # credentialWaitTimeout: "120s"

# [KUADRANT]: Kuadrant operand controller — reconciles Kuadrant CR in kuadrant-system.
# When enabled, the operator creates and drift-reconciles the Kuadrant CR that
# setup-kagenti.sh currently applies manually. Requires the Kuadrant CRD to be
# installed (controller is a no-op otherwise).
kuadrant:
  enable: false

# [MLFLOW]: MLflow experiment tracking integration
mlflow:
  enable: false
  # Kubernetes namespace used as the x-mlflow-workspace header value (RHOAI only).
  # Required for RHOAI MLflow; leave empty for vanilla MLflow deployments.
  workspace: ""
  # MLflow experiment name. Created automatically if it doesn't exist.
  experimentName: "kagenti-traces"

# [OTEL BOOTSTRAP]: OTel collector bootstrap at operator startup.
# When enabled, the operator assembles the OTel collector ConfigMap from
# detected components (Phoenix, MLflow) and projects the OpenShift ingress
# CA into the operator namespace (OCP only). Replaces the Helm-based
# otel-ingress-ca-job and kagenti.otel.collectorConfig helper.
otelBootstrap:
  enable: false

# [VERIFIED FETCH]: mTLS-authenticated fetch of agent cards via SPIFFE identity (Phase 1)
# When enabled, the operator uses go-spiffe mTLS to fetch agent cards and records
# the agent's attested SPIFFE ID in CRD status.
verifiedFetch:
  enabled: false
  spiffeEndpointSocket: "unix:///spiffe-workload-api/spire-agent.sock"
  # Agents must expose a Service port named "agent-tls" (default 8443).
  # The operator discovers the TLS endpoint by port name, not number.

# [SIGNATURE VERIFICATION]: A2A agent card signature verification via SPIRE x5c
signatureVerification:
  # Enable signature verification for agent cards
  enabled: false
  # Audit mode: log failures but don't block (use for gradual rollout)
  auditMode: false
  # Enforce network policies based on signature verification
  enforceNetworkPolicies: false
  # SPIRE trust domain. Auto-discovered from ZTWIM CR or spire-bundle ConfigMap.
  # Set here only to override auto-discovery. Used by ClientRegistrationReconciler
  # to build SPIFFE-shaped Keycloak client IDs (spiffe://<trust-domain>/ns/<ns>/sa/<sa>).
  spireTrustDomain: ""
  # Key within the SPIRE trust bundle ConfigMap. Matches the SPIRE hardened Helm chart default
  # and the binary flag default. Override to "bundle.crt" only for older ZTWIM deployments.
  spireTrustBundle:
    configMapName: "spire-bundle"
    configMapNamespace: ""
    configMapKey: "bundle.spiffe"
    refreshInterval: "5m"
  # How far before SVID expiry to trigger proactive workload restart
  svidExpiryGracePeriod: "30m"

# Supply-chain: sigstore-a2a SignedAgentCard bundle verification (Rekor / Fulcio)
sigstore:
  cardVerification:
    enabled: false
    auditMode: false
    certificateIdentity: ""
    certificateOIDCIssuer: ""
    staging: false
    trustedRoot:
      configMapName: ""
      configMapNamespace: ""
      configMapKey: "trusted-root.json"

# Feature gates — highest-priority layer in the injection precedence chain.
# Set globalEnabled to false to disable ALL sidecar injection (kill switch).
# Set individual gates to false to disable specific sidecars cluster-wide.
#
# spiffe-helper and client-registration no longer have feature gates:
#   * spiffe-helper is bundled inside the combined authbridge images and
#     gated per-workload by the SPIRE_ENABLED env var.
#   * client-registration is operator-managed (no in-pod sidecar).
featureGates:
  globalEnabled: true
  envoyProxy: true
  # injectTools controls whether tool workloads (kagenti.io/type=tool) receive
  # sidecar injection. Defaults to false — tools are not injected by default.
  injectTools: false
  # perWorkloadConfigResolution controls whether namespace ConfigMaps/Secrets are
  # read on every admission request (true) or cached per namespace (false).
  # Default false — cached mode is faster and sufficient when namespace ConfigMaps
  # rarely change. Cache is cleared on webhook pod restart.
  perWorkloadConfigResolution: false
  # skillDiscovery controls whether the AgentRuntime controller reads the
  # kagenti.io/skills annotation from target workloads and populates
  # status.linkedSkills. Default false.
  skillDiscovery: false

# Platform defaults for AuthBridge sidecar injection.
# These are the lowest-priority layer — overridden by feature gates,
# namespace labels/ConfigMaps, and workload labels/AgentRuntime CRs.
#
# Three combined images, selected per workload by deployment mode:
#   * envoyProxy     (envoy-sidecar mode):     Envoy + ext_proc authbridge + spiffe-helper.
#   * authbridge     (proxy-sidecar mode, default): authbridge-proxy (full plugin set) + spiffe-helper.
#   * authbridgeLite (lite mode):              authbridge-lite (jwt-validation + token-exchange only,
#                                              parsers dropped) + spiffe-helper. Same listener layout
#                                              as authbridge; for size-constrained deployments.
# proxy-init applies to envoy-sidecar mode (transparent redirect) and to
# proxy-sidecar / lite mode (always-on enforce-redirect egress capture).
defaults:
  images:
    envoyProxy: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:latest
    authbridge: quay.io/opendatahub/odh-authbridge:latest
    authbridgeLite: ghcr.io/kagenti/kagenti-extensions/authbridge-lite:latest
    proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:latest
    pullPolicy: IfNotPresent

  # Proxy settings
  proxy:
    port: 15123
    uid: 1337
    adminPort: 9901
    inboundProxyPort: 15124
    # Forward proxy's transparent listener port — the REDIRECT target for the
    # always-on enforce-redirect egress guard (proxy-sidecar / lite). MUST match
    # the authbridge listener.transparent_proxy_addr (default :8082).
    transparentPort: 8082
    # Cluster DNS is kept direct by proxy-init itself (it reads the pod's
    # /etc/resolv.conf nameservers), so there is no in-cluster CIDR knob to set —
    # works on Kind / OpenShift / EKS / NodeLocal-DNSCache with no per-cluster config.
    # iptables backend override, injected as IPTABLES_CMD. Empty (default) lets
    # proxy-init auto-detect from /proc/modules (iptable_nat loaded => legacy, as
    # on Kind/kubeadm; absent => nft, as on OpenShift/ROSA). Set to "iptables"
    # (nft) or "iptables-legacy" to force a backend where detection is undesired.
    iptablesCmd: ""

    # Platform-level governance: which egressEnforcement modes workloads may select.
    # The webhook overrides the resolved value to the first entry when the
    # workload's choice is not in this list.
    #   ["enforce-redirect"]             — no opt-out allowed (iptables required)
    #   ["none"]                         — iptables disabled cluster-wide (ROSA HCP)
    #   ["enforce-redirect", "none"]     — workloads choose (default)
    allowedEgressEnforcement:
      - enforce-redirect
      - none

  # Resource defaults (conservative for dev)
  # Note: requests must be <= limits
  resources:
    envoyProxy:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    proxyInit:
      requests:
        cpu: 10m
        memory: 10Mi
      limits:
        cpu: 10m
        memory: 10Mi
    authbridge:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi
