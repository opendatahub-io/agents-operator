# [MANAGER]: Manager Deployment Configurations
controllerManager:
  replicas: 1
  container:
    image:
      repository: ghcr.io/kagenti/kagenti-operator/kagenti-operator
      tag: __PLACEHOLDER__
      pullPolicy: IfNotPresent
    args:
      - "--leader-elect"
      - "--metrics-bind-address=:8443"
      - "--health-probe-bind-address=:8081"
      - "--webhook-cert-path=/tmp/k8s-webhook-server/serving-certs"
      - "--config-path=/etc/kagenti/config.yaml"
      - "--feature-gates-path=/etc/kagenti/feature-gates/feature-gates.yaml"
      - "--enable-client-registration=true"
    cmd: /manager
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
    livenessProbe:
      initialDelaySeconds: 15
      periodSeconds: 20
      httpGet:
        path: /healthz
        port: 8081
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 10
      httpGet:
        path: /readyz
        port: 8081
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - "ALL"
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  terminationGracePeriodSeconds: 10
  serviceAccountName: controller-manager

# [RBAC]: To enable RBAC (Permissions) configurations
rbac:
  enable: true

# [CRDs]: To enable the CRDs
crd:
  # This option determines whether the CRDs are included
  # in the installation process.
  enable: true

  # Enabling this option adds the "helm.sh/resource-policy": keep
  # annotation to the CRD, ensuring it remains installed even when
  # the Helm release is uninstalled.
  # NOTE: Removing the CRDs will also remove all cert-manager CR(s)
  # (Certificates, Issuers, ...) due to garbage collection.
  keep: true

# [METRICS]: Set to true to generate manifests for exporting metrics.
# To disable metrics export set false, and ensure that the
# ControllerManager argument "--metrics-bind-address=:8443" is removed.
metrics:
  enable: true

# [WEBHOOKS]: Webhooks configuration
# The following configuration is automatically generated from the manifests
# generated by controller-gen. To update run 'make manifests' and
# the edit command with the '--force' flag
webhook:
  enable: true

# [PROMETHEUS]: To enable a ServiceMonitor to export metrics to Prometheus set true
prometheus:
  enable: false

# [CERT-MANAGER]: To enable cert-manager injection to webhooks set true
certmanager:
  enable: true

# [NETWORK POLICIES]: To enable NetworkPolicies set true
networkPolicy:
  enable: false

# [MLFLOW]: MLflow experiment tracking integration
mlflow:
  enable: false

# [SIGNATURE VERIFICATION]: A2A agent card signature verification via SPIRE x5c
signatureVerification:
  # Enable signature verification for agent cards
  enabled: false
  # Audit mode: log failures but don't block (use for gradual rollout)
  auditMode: false
  # Enforce network policies based on signature verification
  enforceNetworkPolicies: false
  # SPIRE trust domain. Required when SPIRE is enabled in the cluster even if
  # signatureVerification.enabled is false: the ClientRegistrationReconciler
  # uses this to build SPIFFE-shaped Keycloak client IDs
  # (spiffe://<trust-domain>/ns/<ns>/sa/<sa>) whenever authbridge-config has
  # SPIRE_ENABLED=true. The chart renders --spire-trust-domain independently of
  # signatureVerification.enabled for this reason.
  spireTrustDomain: ""
  # Key within the SPIRE trust bundle ConfigMap. Matches the SPIRE hardened Helm chart default
  # and the binary flag default. Override to "bundle.crt" only for older ZTWIM deployments.
  spireTrustBundle:
    configMapName: "spire-bundle"
    configMapNamespace: ""
    configMapKey: "bundle.spiffe"
    refreshInterval: "5m"
  # How far before SVID expiry to trigger proactive workload restart
  svidExpiryGracePeriod: "30m"

# Feature gates — highest-priority layer in the injection precedence chain.
# Set globalEnabled to false to disable ALL sidecar injection (kill switch).
# Set individual gates to false to disable specific sidecars cluster-wide.
#
# spiffe-helper and client-registration no longer have feature gates:
#   * spiffe-helper is bundled inside the combined authbridge images and
#     gated per-workload by the SPIRE_ENABLED env var.
#   * client-registration is operator-managed (no in-pod sidecar).
featureGates:
  globalEnabled: true
  envoyProxy: true
  # injectTools controls whether tool workloads (kagenti.io/type=tool) receive
  # sidecar injection. Defaults to false — tools are not injected by default.
  injectTools: false
  # perWorkloadConfigResolution controls whether namespace ConfigMaps/Secrets are
  # read on every admission request (true) or cached per namespace (false).
  # Default false — cached mode is faster and sufficient when namespace ConfigMaps
  # rarely change. Cache is cleared on webhook pod restart.
  perWorkloadConfigResolution: false

# Platform defaults for AuthBridge sidecar injection.
# These are the lowest-priority layer — overridden by feature gates,
# namespace labels/ConfigMaps, and workload labels/AgentRuntime CRs.
#
# Two combined images, selected per workload by deployment mode:
#   * envoyProxy (envoy-sidecar mode): Envoy + ext_proc authbridge + spiffe-helper.
#   * authbridge (proxy-sidecar mode, default): authbridge proxy + spiffe-helper.
# proxy-init applies to envoy-sidecar mode only.
defaults:
  images:
    envoyProxy: ghcr.io/kagenti/kagenti-extensions/authbridge-envoy:latest
    authbridge: ghcr.io/kagenti/kagenti-extensions/authbridge:latest
    proxyInit: ghcr.io/kagenti/kagenti-extensions/proxy-init:latest
    pullPolicy: IfNotPresent

  # Proxy settings
  proxy:
    port: 15123
    uid: 1337
    adminPort: 9901
    inboundProxyPort: 15124

  # Resource defaults (conservative for dev)
  # Note: requests must be <= limits
  resources:
    envoyProxy:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
    proxyInit:
      requests:
        cpu: 10m
        memory: 10Mi
      limits:
        cpu: 10m
        memory: 10Mi
    authbridge:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 384Mi
